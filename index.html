<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性癖シンクロ診断 - 究極修正版</title>
    <style>
        :root { --bg: #fdfbfb; --pink: #ff4d79; --blue: #6366f1; --gold: #d4a017; --black: #222; }
        body { font-family: sans-serif; background: var(--bg); color: #444; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .card { background: white; width: 100%; max-width: 600px; padding: 25px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 20px; box-sizing: border-box; }
        h1 { font-size: 1.4rem; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        input[type="text"] { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; }
        .calc-btn { width: 100%; height: 60px; background: var(--black); color: white; border: none; border-radius: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #resultArea { display: none; text-align: center; }
        .score-big { font-size: 5rem; font-weight: 900; color: var(--pink); margin: 0; }
        
        /* センターラインゲージのスタイル */
        .item-row { background: #fff; padding: 20px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #eee; text-align: left; }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 12px; }
        .gauge-label { font-size: 0.75rem; color: #999; margin-bottom: 4px; display: flex; justify-content: space-between; }
        
        .diverging-bar-container { position: relative; width: 100%; height: 24px; background: #f0f0f0; border-radius: 12px; overflow: hidden; margin-bottom: 8px; }
        .center-line { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #ddd; z-index: 2; }
        .bar-fill { position: absolute; height: 100%; top: 0; transition: width 1.2s ease-out, left 1.2s ease-out; }
        
        .val-text { font-family: monospace; font-weight: bold; }
        .val-plus { color: var(--pink); }
        .val-minus { color: var(--blue); }
        .diff-tag { font-size: 0.75rem; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="card" id="inputCard">
        <h1>性癖シンクロ診断</h1>
        <div class="input-group"><label>正解URL</label><input type="text" id="urlA"></div>
        <div class="input-group"><label>回答URL</label><input type="text" id="urlB"></div>
        <button class="calc-btn" onclick="startAnalysis()">答え合わせを開始</button>
    </div>

    <div class="card" id="resultArea">
        <div class="score-big" id="scoreDisplay">0%</div>
        <div id="pitariDisplay" style="margin: 15px 0; font-weight: bold; color: var(--gold);"></div>
        <div id="comparisonList"></div>
        <button class="calc-btn" onclick="location.reload()">もう一度</button>
    </div>

    <script>
        const ALL_PRESETS = ['長身','小柄','モデル体型','日焼け','褐色','貧乳・微乳','巨乳','お尻','手','生足・太もも','おへそ','背中','そばかす','ショートヘア','ロングヘア','ボブヘア','ポニーテール','ツインテール','お団子ヘア','ウルフカット','インナーカラー','ぱっつん','三つ編み','シースルーバング','デコ出し','ロリ','ショタ','お姉さん','妹・姉','ギャル','メスガキ','清楚','清楚ビッチ','無口','クーデレ','地雷系','TS','ツンデレ','天然・ドジっ子','小悪魔','ギャップ萌え','外国人・ハーフ','男の娘','オタク女子','強気・男勝り','スポーツ女子','高学歴女子','一人称名前','制服','スーツ','和服','部屋着（パジャマ）','コスプレ','オーバーサイズ','可愛い下着','子供っぽい下着','ガーターベルト','メガネ','チョーカー','幼馴染','同い年','先生と生徒','主従関係','体格差','片思い','共依存','密室','野外・露出','背徳感','NTR','初対面','喧嘩中','執着','開拓','敬語','ローション・オイル','汗','あくび','くしゃみ','声','泣き顔','怒り顔','拒絶','キス','ハグ','膝枕','頭を撫でる','首を噛む','おねだり','指舐め','耳攻め','囁き','首絞め','命令','催眠','目隠し','緊縛','放置','拘束','M','S','お漏らし','焦らし'];

        function parseURL(urlStr) {
            try {
                const url = new URL(urlStr);
                const v2 = url.searchParams.get('v2');
                const parts = v2.includes('.') ? v2.split('.') : v2.match(/[^_]+_[^_]+_[^_]+/g);
                return parts.map(p => {
                    const [n, v] = p.split('_');
                    return { name: isNaN(n) ? decodeURIComponent(n) : ALL_PRESETS[parseInt(n)], val: parseFloat(v) };
                });
            } catch (e) { return null; }
        }

        function startAnalysis() {
            const dataA = parseURL(document.getElementById('urlA').value);
            const dataB = parseURL(document.getElementById('urlB').value);
            if (!dataA || !dataB) return alert("URLエラー");

            document.getElementById('inputCard').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';

            let totalDiff = 0;
            const list = document.getElementById('comparisonList');
            list.innerHTML = "";

            dataA.forEach(itemA => {
                const itemB = dataB.find(b => b.name === itemA.name) || { val: 0 };
                // 最大誤差200に基づいた計算 (+100 と -100 の差は 200)
                const diff = Math.abs(itemA.val - itemB.val);
                totalDiff += diff;

                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <div class="item-header"><span>${itemA.name}</span><span class="diff-tag">誤差: ${diff}</span></div>
                    
                    <div class="gauge-label"><span>正解</span><span class="val-text ${itemA.val>=0?'val-plus':'val-minus'}">${itemA.val}%</span></div>
                    <div class="diverging-bar-container">
                        <div class="center-line"></div>
                        <div class="bar-fill" style="background:var(--pink); ${itemA.val>=0 ? `left:50%; width:${itemA.val/2}%` : `left:${50+itemA.val/2}%; width:${Math.abs(itemA.val/2)}%; background:var(--blue);`}"></div>
                    </div>

                    <div class="gauge-label"><span>予想</span><span class="val-text ${itemB.val>=0?'val-plus':'val-minus'}">${itemB.val}%</span></div>
                    <div class="diverging-bar-container">
                        <div class="center-line"></div>
                        <div class="bar-fill" style="background:var(--pink); ${itemB.val>=0 ? `left:50%; width:${itemB.val/2}%` : `left:${50+itemB.val/2}%; width:${Math.abs(itemB.val/2)}%; background:var(--blue);`}"></div>
                    </div>
                `;
                list.appendChild(row);
            });

            const maxTotalError = dataA.length * 200;
            const score = ((1 - (totalDiff / maxTotalError)) * 100).toFixed(1);
            document.getElementById('scoreDisplay').innerText = score + "%";
        }
    </script>
</body>
</html>
