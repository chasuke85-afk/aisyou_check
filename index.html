<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性癖シンクロ診断 - THE FINAL</title>
    <style>
        :root { --bg: #fdfbfb; --pink: #ff4d79; --blue: #6366f1; --gold: #d4a017; --black: #222; }
        body { font-family: sans-serif; background: var(--bg); color: #444; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; transition: background 0.8s; }
        body.rank-bad { background: #00051a; color: #4d94ff; } 

        .card { background: rgba(255,255,255,0.95); width: 100%; max-width: 600px; padding: 25px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 20px; box-sizing: border-box; backdrop-filter: blur(10px); }
        h1 { font-size: 1.4rem; text-align: center; margin-bottom: 25px; letter-spacing: 2px; }
        
        .name-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 6px; color: #666; }
        input[type="text"] { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 0.9rem; box-sizing: border-box; }
        
        .calc-btn { width: 100%; height: 65px; background: var(--black); color: white; border: none; border-radius: 18px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 5px 0 #000; transition: 0.2s; }
        .calc-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }

        #resultArea { display: none; text-align: center; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .score-big { font-size: 5rem; font-weight: 900; color: var(--pink); margin: 0; line-height: 1; }
        .rank-name { font-size: 1.6rem; font-weight: bold; display: block; margin-top: 15px; }
        
        /* 左右分割ゲージ */
        .item-row { background: white; padding: 18px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #eee; text-align: left; }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; }
        .diff-tag { font-size: 0.75rem; padding: 3px 8px; border-radius: 6px; background: #f0f0f0; color: #555; }

        .gauge-section { margin-bottom: 8px; }
        .gauge-label { display: flex; justify-content: space-between; font-size: 0.7rem; font-weight: bold; color: #999; margin-bottom: 4px; }
        .val-num { font-family: monospace; font-size: 0.85rem; }
        .val-num.plus { color: var(--pink); }
        .val-num.minus { color: var(--blue); }

        .diverging-container { position: relative; width: 100%; height: 16px; background: #f0f0f0; border-radius: 8px; overflow: hidden; }
        .center-line { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #ccc; z-index: 2; }
        .bar-fill { position: absolute; height: 100%; top: 0; width: 0; transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1), left 1.5s cubic-bezier(0.19, 1, 0.22, 1); }

        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top-color: var(--pink); border-radius: 50%; animation: spin 1s infinite linear; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card" id="inputCard">
        <h1>性癖シンクロ診断</h1>
        <div class="name-inputs">
            <div class="input-group"><label>出題者</label><input type="text" id="nameA" placeholder="Aさん"></div>
            <div class="input-group"><label>回答者</label><input type="text" id="nameB" placeholder="Bさん"></div>
        </div>
        <div class="input-group"><label>🔑 正解URL</label><input type="text" id="urlA"></div>
        <div class="input-group"><label>❓ 回答URL</label><input type="text" id="urlB"></div>
        <button class="calc-btn" onclick="startAnalysis()">答え合わせを開始！</button>
    </div>

    <div id="loading" class="loading-overlay"><div class="spinner"></div><b>シンクロ率を計算中...</b></div>

    <div class="card" id="resultArea">
        <div style="font-size:0.9rem; margin-bottom:10px;"><span id="resNameA" style="color:var(--pink); font-weight:bold;"></span> さんの深淵を <span id="resNameB" style="color:var(--blue); font-weight:bold;"></span> さんが覗いた...</div>
        <div class="score-big" id="scoreDisplay">0.0%</div>
        <span id="rankLabel" class="rank-name"></span>
        <div id="pitariDisplay" style="margin: 15px 0; font-size: 0.85rem; color: var(--gold); font-weight: bold;"></div>
        <div id="comparisonList"></div>
        <button class="calc-btn" style="background:var(--blue); box-shadow:0 5px 0 #3d3fb5; margin-bottom:10px;" onclick="copyShareURL()">結果URLのみコピー</button>
        <button class="calc-btn" style="background:#888; box-shadow:0 5px 0 #555;" onclick="location.reload()">最初からやり直す</button>
    </div>

    <script>
        const ALL_PRESETS = ['長身','小柄','モデル体型','日焼け','褐色','貧乳・微乳','巨乳','お尻','手','生足・太もも','おへそ','背中','そばかす','ショートヘア','ロングヘア','ボブヘア','ポニーテール','ツインテール','お団子ヘア','ウルフカット','インナーカラー','ぱっつん','三つ編み','シースルーバング','デコ出し','ロリ','ショタ','お姉さん','妹・姉','ギャル','メスガキ','清楚','清楚ビッチ','無口','クーデレ','地雷系','TS','ツンデレ','天然・ドジっ子','小悪魔','ギャップ萌え','外国人・ハーフ','男の娘','オタク女子','強気・男勝り','スポーツ女子','高学歴女子','一人称名前','制服','スーツ','和服','部屋着（パジャマ）','コスプレ','オーバーサイズ','可愛い下着','子供っぽい下着','ガーターベルト','メガネ','チョーカー','幼馴染','同い年','先生と生徒','主従関係','体格差','片思い','共依存','密室','野外・露出','背徳感','NTR','初対面','喧嘩中','執着','開拓','敬語','ローション・オイル','汗','あくび','くしゃみ','声','泣き顔','怒り顔','拒絶','キス','ハグ','膝枕','頭を撫でる','首を噛む','おねだり','指舐め','耳攻め','囁き','首絞め','命令','催眠','目隠し','緊縛','放置','拘束','M','S','お漏らし','焦らし'];

        const RANKS = [
            { min: 90, title: "🏆 限界オタク（本人）" }, { min: 80, title: "🧠 脳内メーカー直結" }, { min: 70, title: "🧐 古参の理解者" },
            { min: 60, title: "🤔 知ったかぶり中級者" }, { min: 50, title: "🤡 勘違いモンスター" }, { min: 0,  title: "🧊 虚無（ログアウト推奨）" }
        ];

        function parseURL(u) {
            try {
                const url = new URL(u);
                const v2 = url.searchParams.get('v2');
                const parts = v2.includes('.') ? v2.split('.') : v2.match(/[^_]+_[^_]+_[^_]+/g);
                return parts.map(p => {
                    const [n, v] = p.split('_');
                    return { name: isNaN(n) ? decodeURIComponent(n) : (ALL_PRESETS[parseInt(n)] || "??"), val: parseFloat(v) };
                });
            } catch (e) { return null; }
        }

        async function startAnalysis() {
            const dataA = parseURL(document.getElementById('urlA').value);
            const dataB = parseURL(document.getElementById('urlB').value);
            if(!dataA || !dataB) return alert("URLを正しく入れてください");

            document.getElementById('inputCard').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            await new Promise(r => setTimeout(r, 1200));
            document.getElementById('loading').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';

            document.getElementById('resNameA').innerText = document.getElementById('nameA').value || "出題者";
            document.getElementById('resNameB').innerText = document.getElementById('nameB').value || "回答者";

            let totalDiff = 0, pitari = 0;
            const list = document.getElementById('comparisonList');
            list.innerHTML = "";

            dataA.forEach(itemA => {
                const itemB = dataB.find(b => b.name === itemA.name) || { val: 0 };
                const diff = Math.abs(itemA.val - itemB.val);
                totalDiff += diff;
                if(diff === 0) pitari++;

                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <div class="item-header"><span>${itemA.name}</span><span class="diff-tag">誤差 ${diff}</span></div>
                    ${createGaugeHTML('正解', itemA.val, 'var(--pink)')}
                    ${createGaugeHTML('予想', itemB.val, 'var(--blue)')}
                `;
                list.appendChild(row);
            });

            setTimeout(() => {
                document.querySelectorAll('.bar-fill').forEach(el => {
                    const v = parseFloat(el.dataset.v);
                    el.style.width = Math.abs(v/2) + '%';
                    el.style.left = (v >= 0 ? 50 : 50 + v/2) + '%';
                });
            }, 100);

            const score = ((1 - (totalDiff / (dataA.length * 200))) * 100).toFixed(1);
            animateScore(score);
            document.getElementById('pitariDisplay').innerText = `完全一致：${pitari} / ${dataA.length}`;
            document.getElementById('rankLabel').innerText = RANKS.find(r => score >= r.min).title;
            if(score < 50) document.body.classList.add("rank-bad");
        }

        function createGaugeHTML(label, val, color) {
            return `
                <div class="gauge-section">
                    <div class="gauge-label"><span>${label}</span><span class="val-num ${val>=0?'plus':'minus'}">${val}%</span></div>
                    <div class="diverging-container">
                        <div class="center-line"></div>
                        <div class="bar-fill" style="background:${val>=0?'var(--pink)':'var(--blue)'}; left:50%;" data-v="${val}"></div>
                    </div>
                </div>`;
        }

        function animateScore(target) {
            let cur = 0;
            const timer = setInterval(() => {
                cur += 1.5;
                if(cur >= target) { document.getElementById('scoreDisplay').innerText = target + "%"; clearInterval(timer); }
                else { document.getElementById('scoreDisplay').innerText = cur.toFixed(1) + "%"; }
            }, 20);
        }

        function copyShareURL() {
            const p = new URLSearchParams();
            p.set('vA', new URL(document.getElementById('urlA').value).searchParams.get('v2'));
            p.set('vB', new URL(document.getElementById('urlB').value).searchParams.get('v2'));
            p.set('nA', document.getElementById('resNameA').innerText);
            p.set('nB', document.getElementById('resNameB').innerText);
            navigator.clipboard.writeText(window.location.origin + window.location.pathname + '?' + p.toString()).then(() => alert("コピーしました！"));
        }

        window.onload = function() {
            const p = new URLSearchParams(window.location.search);
            if(p.has('vA')) {
                document.getElementById('nameA').value = p.get('nA'); document.getElementById('nameB').value = p.get('nB');
                const base = window.location.origin + window.location.pathname;
                document.getElementById('urlA').value = base + "?v2=" + p.get('vA');
                document.getElementById('urlB').value = base + "?v2=" + p.get('vB');
                startAnalysis();
            }
        };
    </script>
</body>
</html>
