<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性癖シンクロ診断 - 答え合わせ</title>
    <style>
        :root { --bg: #fdfbfb; --accent: #ff4d79; --blue: #6366f1; --gold: #d4a017; }
        body { font-family: sans-serif; background: var(--bg); color: #444; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        
        body.rank-god { background: #fff0f5; } 
        body.rank-good { background: #f0f7ff; } 
        body.rank-bad { background: #ebebeb; }    

        .card { background: rgba(255,255,255,0.95); width: 100%; max-width: 600px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; backdrop-filter: blur(5px); }
        h1 { font-size: 1.4rem; text-align: center; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; color: #555; }
        input[type="text"] { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px; font-size: 0.9rem; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--accent); outline: none; }
        
        .calc-btn { width: 100%; height: 60px; background: #333; color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 0 #000; }
        .calc-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #000; }

        #resultArea { display: none; text-align: center; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .score-big { font-size: 4.5rem; font-weight: bold; color: var(--accent); margin: 10px 0; }
        .rank-name { font-size: 1.6rem; font-weight: bold; color: #333; padding: 5px 15px; border-radius: 30px; background: rgba(0,0,0,0.05); display: inline-block; }
        
        /* 比較リストのスタイル */
        .comparison-table { margin-top: 30px; text-align: left; }
        .item-row { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #eee; }
        .item-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.95rem; margin-bottom: 10px; }
        .diff-tag { font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; background: #f0f0f0; }
        .diff-tag.perfect { background: var(--gold); color: white; }

        .bar-container { display: flex; align-items: center; gap: 10px; height: 12px; }
        .bar-label { font-size: 0.7rem; width: 60px; color: #888; }
        .bar-bg { flex: 1; background: #f0f0f0; height: 100%; border-radius: 6px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; border-radius: 6px; transition: width 1s ease-out; }

        .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card" id="inputCard">
        <h1>性癖シンクロ診断</h1>
        <div class="input-group">
            <label>🔑 あなたの性癖（正解URL）</label>
            <input type="text" id="urlA" placeholder="自分の作成したURLを貼る">
        </div>
        <div class="input-group">
            <label>❓ 相手の予想（回答URL）</label>
            <input type="text" id="urlB" placeholder="相手から届いたURLを貼る">
        </div>
        <button class="calc-btn" onclick="startAnalysis()">答え合わせを開始！</button>
    </div>

    <div id="loading" class="loading-overlay">
        <div class="spinner"></div>
        <div style="font-weight:bold; color:var(--accent);">スキャン中...</div>
    </div>

    <div class="card" id="resultArea">
        <div id="rankLabel" class="rank-name">解析完了</div>
        <div class="score-big" id="scoreDisplay">0.0%</div>
        <div id="pitariDisplay" style="font-size:0.9rem; font-weight:bold; color:var(--gold);"></div>
        
        <div class="comparison-table" id="comparisonList">
            </div>

        <button class="calc-btn" style="margin-top:30px; background:#666; box-shadow:0 4px 0 #444;" onclick="location.reload()">もう一度診断する</button>
    </div>

    <script>
        const ALL_PRESETS = ['長身','小柄','モデル体型','日焼け','褐色','貧乳・微乳','巨乳','お尻','手','生足・太もも','おへそ','背中','そばかす','ショートヘア','ロングヘア','ボブヘア','ポニーテール','ツインテール','お団子ヘア','ウルフカット','インナーカラー','ぱっつん','三つ編み','シースルーバング','デコ出し','ロリ','ショタ','お姉さん','妹・姉','ギャル','メスガキ','清楚','清楚ビッチ','無口','クーデレ','地雷系','TS','ツンデレ','天然・ドジっ子','小悪魔','ギャップ萌え','外国人・ハーフ','男の娘','オタク女子','強気・男勝り','スポーツ女子','高学歴女子','一人称名前','制服','スーツ','和服','部屋着（パジャマ）','コスプレ','オーバーサイズ','可愛い下着','子供っぽい下着','ガーターベルト','メガネ','チョーカー','幼馴染','同い年','先生と生徒','主従関係','体格差','片思い','共依存','密室','野外・露出','背徳感','NTR','初対面','喧嘩中','執着','敬語','ローション・オイル','汗','あくび','くしゃみ','声','泣き顔','怒り顔','拒絶','キス','ハグ','膝枕','頭を撫でる','首を噛む','おねだり','指舐め','耳攻め','囁き','首絞め','命令','催眠','目隠し','緊縛','放置','拘束','M','S','お漏らし','焦らし'];

        function parseURL(urlStr) {
            try {
                const url = new URL(urlStr);
                const v2 = url.searchParams.get('v2');
                if (!v2) return null;
                return v2.split('.').map(p => {
                    const [n, v, s] = p.split('_');
                    return { name: isNaN(n) ? decodeURIComponent(n) : ALL_PRESETS[parseInt(n)], val: parseInt(v) };
                });
            } catch (e) { return null; }
        }

        async function startAnalysis() {
            const dataA = parseURL(document.getElementById('urlA').value);
            const dataB = parseURL(document.getElementById('urlB').value);

            if (!dataA || !dataB) return alert("正しいURLを入力してください");

            document.getElementById('inputCard').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';

            // 演出用ウェイト
            await new Promise(r => setTimeout(r, 1200));
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';

            let totalDiff = 0;
            let pitari = 0;
            const list = document.getElementById('comparisonList');
            
            dataA.forEach(itemA => {
                const itemB = dataB.find(b => b.name === itemA.name) || { val: 0 };
                const diff = Math.abs(itemA.val - itemB.val);
                totalDiff += diff;
                if (diff === 0) pitari++;

                // 行の作成
                const row = document.createElement('div');
                row.className = 'item-row';
                
                const diffPercent = Math.round(diff / 2); // 最大200の差を100%スケールに
                const diffText = diff === 0 ? '<span class="diff-tag perfect">★ 完全一致</span>' : `<span class="diff-tag">誤差 ${diffPercent}%</span>`;

                row.innerHTML = `
                    <div class="item-header">
                        <span>${itemA.name}</span>
                        ${diffText}
                    </div>
                    <div class="bar-container">
                        <div class="bar-label">正解</div>
                        <div class="bar-bg"><div class="bar-fill" style="width:${Math.abs(itemA.val)}%; background:${itemA.val>=0?'var(--accent)':'var(--blue)'};"></div></div>
                    </div>
                    <div class="bar-container" style="margin-top:4px;">
                        <div class="bar-label">相手予想</div>
                        <div class="bar-bg"><div class="bar-fill" style="width:${Math.abs(itemB.val)}%; background:${itemB.val>=0?'var(--accent)':'var(--blue)'};"></div></div>
                    </div>
                `;
                list.appendChild(row);
            });

            const maxError = dataA.length * 200;
            const syncRate = ((1 - (totalDiff / maxError)) * 100).toFixed(1);
            
            animateScore(syncRate);
            document.getElementById('pitariDisplay').innerText = `ピタリ賞：${pitari} / ${dataA.length}`;
            setRank(syncRate);
        }

        function animateScore(target) {
            let current = 0;
            const display = document.getElementById('scoreDisplay');
            const timer = setInterval(() => {
                current += 2.1;
                if (current >= target) {
                    display.innerText = target + "%";
                    clearInterval(timer);
                } else {
                    display.innerText = current.toFixed(1) + "%";
                }
            }, 20);
        }

        function setRank(rate) {
            const label = document.getElementById('rankLabel');
            if (rate >= 95) { label.innerText = "運命の共同体"; document.body.className="rank-god"; }
            else if (rate >= 80) { label.innerText = "性癖の理解者"; document.body.className="rank-good"; }
            else if (rate >= 60) { label.innerText = "気が合う友人"; }
            else if (rate >= 30) { label.innerText = "まだまだこれから"; }
            else { label.innerText = "未知の生物"; document.body.className="rank-bad"; }
        }
    </script>
</body>
</html>
